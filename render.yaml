services:
  - type: web
    name: focus-ai
    runtime: python
    plan: free
    buildCommand: "python3 --version"
    startCommand: "python3 server.py"
    envVars:
      - key: FOCUS_AI_ADMIN_USERNAME
        value: "admin"
      - key: FOCUS_AI_ADMIN_PASSWORD
        sync: false
      - key: FOCUS_AI_SECURE_COOKIES
        value: "1"